#
# Identical to conway_2c00.cfg except MAIN starts one page later. Linking
# conway_main.o/conway_grid.o against this config instead of the $2C00 one
# produces a correctly-relocated binary WITHOUT reassembling either .s file
# -- that's the core claim this spike exists to test, in contrast to Kick's
# add_external_app, which reassembles conway.asm from scratch for both
# addresses (cmake/KickAssembler.cmake). Not shipped on any disk image; it's
# purely evidence for the relocation-at-link-time claim.

MEMORY {
    HEADER: start = $9000, size = $2,    file = %O;
    MAIN:   start = $2D00, size = $0C00, file = %O, define = yes;
}

SEGMENTS {
    HEADER: load = HEADER, type = ro;
    CODE:   load = MAIN,   type = ro, align = 256;
    RODATA: load = MAIN,   type = ro;
    DATA:   load = MAIN,   type = rw;
    BSS:    load = MAIN,   type = bss;
}
