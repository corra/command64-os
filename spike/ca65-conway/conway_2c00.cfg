#
# ld65 linker config: places the spike at $2C00, matching this OS's current
# UserProgStart (CMakeLists.txt USER_PROG_START_HEX). This is the variant
# shipped on test.d64. See conway_2d00.cfg for the "same objects, different
# address" counterpart used to prove address-independent assembly.

MEMORY {
    HEADER: start = $9000, size = $2,    file = %O;
    MAIN:   start = $2C00, size = $0C00, file = %O, define = yes;
}

SEGMENTS {
    HEADER: load = HEADER, type = ro;
    CODE:   load = MAIN,   type = ro, align = 256;
    RODATA: load = MAIN,   type = ro;
    DATA:   load = MAIN,   type = rw;
    BSS:    load = MAIN,   type = bss;
}
