#
# ld65 linker config: places the label spike at $2C00, this OS's current
# UserProgStart. See spike/ca65-conway/conway_2c00.cfg for the header/
# relocation mechanics -- identical scheme, just a different app.

MEMORY {
    HEADER: start = $9000, size = $2,    file = %O;
    MAIN:   start = $2C00, size = $0700, file = %O, define = yes;
}

SEGMENTS {
    HEADER: load = HEADER, type = ro;
    CODE:   load = MAIN,   type = ro;
    RODATA: load = MAIN,   type = ro;
    DATA:   load = MAIN,   type = rw;
    BSS:    load = MAIN,   type = bss;
}
